<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>タイピングゲーム</title>
<style>
    body {
        font-family: sans-serif;
        text-align: center;
        background: #f5f5f5;
        padding-top: 50px;
    }

    #word {
        font-size: 40px;
        font-weight: bold;
        margin: 20px;
    }

    .correct { color: limegreen; }
    .current { color: dodgerblue; text-decoration: underline; }
    .wrong   { color: red; }

    #input {
        font-size: 24px;
        padding: 10px;
        width: 300px;
    }

    #title {
        font-size: 32px;
        margin-top: 20px;
        font-weight: bold;
    }

    /* 称号が変わったときだけ発動するアニメーション */
    @keyframes pop {
        0%   { transform: scale(0.8); opacity: 0.2; }
        60%  { transform: scale(1.2); opacity: 1; }
        100% { transform: scale(1); }
    }
</style>
</head>
<body>

<h1>タイピングゲーム</h1>
<button id="startBtn">スタート</button>

<div id="game" style="display:none;">
    <p id="word"></p>
    <input id="input" type="text" autocomplete="off">
    <p id="score"></p>
    <p id="timer"></p>
    <p id="title"></p>
</div>

<script>
const words = [
    "apple", "banana", "computer", "javascript", "keyboard",
    "window", "programming", "coffee", "music", "challenge"
];

let score = 0;
let time = 30;
let currentWord = "";
let index = 0;
let lastTitle = ""; // ← 前回の称号を記録

const startBtn = document.getElementById("startBtn");
const game = document.getElementById("game");
const wordDisplay = document.getElementById("word");
const input = document.getElementById("input");
const scoreDisplay = document.getElementById("score");
const timerDisplay = document.getElementById("timer");
const titleDisplay = document.getElementById("title");

// 称号（5刻み100まで）
const titles = [
    {score: 5,  name: "Lv1 見習い", color: "gray"},
    {score: 10, name: "Lv2 初心者", color: "blue"},
    {score: 15, name: "Lv3 中級者", color: "green"},
    {score: 20, name: "Lv4 上級者", color: "orange"},
    {score: 25, name: "Lv5 達人", color: "red"},
    {score: 30, name: "Lv6 俊足タイパー", color: "purple"},
    {score: 35, name: "Lv7 鋼の指先", color: "teal"},
    {score: 40, name: "Lv8 疾風タイパー", color: "darkorange"},
    {score: 45, name: "Lv9 鬼速タイパー", color: "crimson"},
    {score: 50, name: "Lv10 タイピング侍", color: "navy"},
    {score: 55, name: "Lv11 タイピング忍者", color: "darkgreen"},
    {score: 60, name: "Lv12 タイピング魔術師", color: "indigo"},
    {score: 65, name: "Lv13 タイピング覇者", color: "darkred"},
    {score: 70, name: "Lv14 タイピング王", color: "goldenrod"},
    {score: 75, name: "Lv15 タイピング皇帝", color: "darkgoldenrod"},
    {score: 80, name: "Lv16 タイピング神", color: "gold"},
    {score: 85, name: "Lv17 超越者", color: "deepskyblue"},
    {score: 90, name: "Lv18 光速タイパー", color: "lime"},
    {score: 95, name: "Lv19 伝説の指", color: "hotpink"},
    {score: 100, name: "Lv20 神速タイパー", color: "yellow"}
];

// 称号更新（変わったときだけ弾む）
function updateTitle() {
    let result = titles.find(t => score <= t.score);
    if (!result) result = titles[titles.length - 1];

    // 称号が変わったかチェック
    if (result.name !== lastTitle) {
        // 称号更新
        titleDisplay.textContent = `称号：${result.name}`;
        titleDisplay.style.color = result.color;

        // アニメーション発動
        titleDisplay.style.animation = "none";
        void titleDisplay.offsetWidth;
        titleDisplay.style.animation = "pop 0.4s ease";

        // 記録更新
        lastTitle = result.name;
    }
}

startBtn.onclick = () => {
    startBtn.style.display = "none";
    game.style.display = "block";
    score = 0;
    time = 30;
    index = 0;
    lastTitle = ""; // ← 初期化
    titleDisplay.textContent = "";
    input.disabled = false;
    input.value = "";
    input.focus();

    nextWord();
    updateTitle();

    const timer = setInterval(() => {
        time--;
        timerDisplay.textContent = `残り時間: ${time}秒`;

        if (time <= 0) {
            clearInterval(timer);
            finishGame();
        }
    }, 1000);
};

function nextWord() {
    currentWord = words[Math.floor(Math.random() * words.length)];
    index = 0;
    renderWord();
}

function renderWord() {
    let html = "";
    for (let i = 0; i < currentWord.length; i++) {
        if (i < index) html += `<span class="correct">${currentWord[i]}</span>`;
        else if (i === index) html += `<span class="current">${currentWord[i]}</span>`;
        else html += currentWord[i];
    }
    wordDisplay.innerHTML = html;
}

input.addEventListener("input", () => {
    const char = input.value.slice(-1);

    if (char === currentWord[index]) {
        index++;

        if (index === currentWord.length) {
            score++;
            scoreDisplay.textContent = `スコア: ${score}`;
            updateTitle();
            nextWord();
        }
    } else {
        wordDisplay.classList.add("wrong");
        setTimeout(() => wordDisplay.classList.remove("wrong"), 150);
    }

    renderWord();
    input.value = "";
});

function finishGame() {
    wordDisplay.innerHTML = "終了！";
    input.disabled = true;
}
</script>

</body>
</html>
