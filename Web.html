<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>阪神算シミュレーター</title>
<style>
  :root {
    --header-height: 150px;
    --bg: #000;
    --panel-bg: #111;
    --text-color: #fff;
  }

  html,body {
    height: 100%;
    margin: 0;
    background: var(--bg);
    color: var(--text-color);
    font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
  }

  /* 上部説明エリア */
  #header {
    box-sizing: border-box;
    width: 100%;
    height: var(--header-height);
    padding: 12px 18px;
    background: var(--panel-bg);
    display: flex;
    gap: 18px;
    align-items: center;
  }

  #header .left {
    flex: 1 1 auto;
    font-size: 16px;
    line-height: 1.4;
  }

  #controls {
    display: flex;
    gap: 10px;
    align-items: center;
    flex: 0 0 auto;
  }

  #controls label {
    font-size: 14px;
    color: #ddd;
  }

  #controls input[type="number"] {
    width: 72px;
  }

  #controls input[type="color"] {
    width: 40px;
    height: 28px;
    padding: 0;
    border: none;
    background: transparent;
  }

  #controls button {
    padding: 6px 10px;
    font-size: 14px;
    cursor: pointer;
  }

  /* 動画＋コメント領域（ヘッダ分だけ小さく） */
  #container {
    position: relative;
    width: 100vw;
    height: calc(100vh - var(--header-height));
    overflow: hidden;
    background: #000;
  }

  /* 動画プレイヤー */
  #videoPlayer {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%,-50%);
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
  }

  /* コメントレイヤー（クリックを受ける） */
  #stage {
    position: absolute;
    left: 0;
    bottom: 0;
    width: 100%;
    height: 100%;
    pointer-events: auto; /* クリックでコメントを出す */
  }

  /* コメント要素 */
  .comment {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    opacity: 1;
    pointer-events: none; /* コメント自体はクリックを妨げない */
    font-weight: bold; /* 太字固定 */
    user-select: none;
  }

  /* 小さな通知（任意） */
  #toast {
    position: absolute;
    right: 12px;
    top: 12px;
    background: rgba(255,255,255,0.06);
    color: #fff;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
    display: none;
  }

  /* レスポンシブ調整（小さい画面でコントロールを折り返す） */
  @media (max-width: 720px) {
    #header { flex-direction: column; height: auto; gap: 8px; padding: 10px; }
    #controls { flex-wrap: wrap; gap: 8px; }
    :root { --header-height: 180px; }
    #container { height: calc(100vh - var(--header-height)); }
  }
</style>
</head>
<body>

<!-- 上部説明とコントロール -->
<div id="header">
  <div class="left">
    <strong>説明：</strong> 動画をアップロードして再生できます。画面をクリック（または Space）でコメントを表示します。「数字を戻す」で33-4に戻ります。
  </div>

  <div id="controls">
    <label>
      動画
      <input id="uploader" type="file" accept="video/*" style="display:inline-block;margin-left:6px;">
    </label>

    <label>
      文字サイズ
      <input id="sizePicker" type="number" value="48" min="10" max="200" step="1" style="margin-left:6px;">
      px
    </label>

    <label>
      色
      <input id="colorPicker" type="color" value="#ff0000">
    </label>

    <button id="resetBtn" title="数字を最初に戻す">数字を戻す</button>
  </div>
</div>

<!-- 動画とコメント領域 -->
<div id="container">
  <video id="videoPlayer" controls></video>
  <div id="stage" aria-hidden="false"></div>
  <div id="toast" role="status" aria-live="polite"></div>
</div>

<script>
/* -------------------------
   基本要素取得
   ------------------------- */
const uploader = document.getElementById('uploader');
const video = document.getElementById('videoPlayer');
const stage = document.getElementById('stage');
const sizePicker = document.getElementById('sizePicker');
const colorPicker = document.getElementById('colorPicker');
const resetBtn = document.getElementById('resetBtn');
const toast = document.getElementById('toast');

/* -------------------------
   阪神算カウンター
   ------------------------- */
let baseA = 33;
let baseB = 4;
let step = 1;

/* -------------------------
   スロット管理
   - スロット位置はフォントサイズに準拠
   - 1列目 start = fontSize/2
   - 2列目 start = fontSize
   - ソートしない（生成順のまま）
   ------------------------- */
let slots = [];

function generateSlots() {
  slots = [];
  const fontSize = Math.max(10, Number(sizePicker.value) || 48);
  const half = fontSize / 2;
  // stage の高さ（動画領域に合わせる）
  const h = stage.clientHeight;

  // 1列目: start = half, step = fontSize
  for (let y = half; y < h; y += fontSize) {
    slots.push({ y: Math.round(y), active: false });
  }

  // 2列目: start = fontSize, step = fontSize
  for (let y = fontSize; y < h; y += fontSize) {
    slots.push({ y: Math.round(y), active: false });
  }
}

/* 初回生成 */
window.addEventListener('load', () => {
  // 少し遅らせて stage のサイズが確定してから生成
  setTimeout(generateSlots, 50);
});

/* ウィンドウリサイズやフォントサイズ変更で再生成 */
window.addEventListener('resize', () => {
  generateSlots();
});
sizePicker.addEventListener('change', () => {
  generateSlots();
});

/* -------------------------
   動画アップロード処理
   ------------------------- */
uploader.addEventListener('change', (e) => {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  // URL.createObjectURL を使って即再生
  video.src = URL.createObjectURL(file);
  video.play().catch(()=>{ /* 自動再生がブロックされても問題なし */ });
});

/* -------------------------
   テキスト生成（33-4 の倍数的表現）
   ------------------------- */
function nextText() {
  const a = baseA * step;
  const b = baseB * step;
  step++;
  return `${a}-${b}`;
}

/* -------------------------
   空きスロット検索（最小 index）
   ------------------------- */
function getFreeSlotIndex() {
  for (let i = 0; i < slots.length; i++) {
    if (!slots[i].active) return i;
  }
  // 全部埋まることは想定していないが保険で 0 を返す
  return 0;
}

/* -------------------------
   コメント生成（瞬間表示、3秒後に瞬間消滅）
   ------------------------- */
function spawnComment() {
  // スロットが未生成なら生成
  if (!slots || slots.length === 0) generateSlots();

  const text = nextText();
  const idx = getFreeSlotIndex();
  const slot = slots[idx];

  const fontSize = Math.max(10, Number(sizePicker.value) || 48);
  const color = colorPicker.value || '#ff0000';

  const div = document.createElement('div');
  div.className = 'comment';
  div.textContent = text;
  div.style.bottom = slot.y + 'px';
  div.style.fontSize = fontSize + 'px';
  div.style.color = color;
  div.style.fontWeight = 'bold'; // 太字固定

  stage.appendChild(div);
  slot.active = true;

  // 3秒後に瞬間消滅（フェードなし）
  setTimeout(() => {
    // 要素がまだ存在するか確認してから削除
    if (div.parentNode) div.parentNode.removeChild(div);
    slot.active = false;
  }, 3000);
}

/* クリックと Space キーでコメントを出す */
stage.addEventListener('click', spawnComment);
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    spawnComment();
  }
});

/* -------------------------
   数字を戻すボタン
   ------------------------- */
resetBtn.addEventListener('click', () => {
  step = 1;
  // 簡単な通知を表示（3秒）
  showToast('数字を最初に戻しました（33-4）', 2000);
});

/* -------------------------
   トースト表示（任意の小通知）
   ------------------------- */
let toastTimer = null;
function showToast(msg, ms = 2000) {
  if (toastTimer) {
    clearTimeout(toastTimer);
    toastTimer = null;
  }
  toast.textContent = msg;
  toast.style.display = 'block';
  toastTimer = setTimeout(() => {
    toast.style.display = 'none';
    toastTimer = null;
  }, ms);
}

/* -------------------------
   初期フォーカスと説明
   ------------------------- */
document.addEventListener('DOMContentLoaded', () => {
  // stage のサイズが確定したらスロット再生成
  setTimeout(generateSlots, 80);
});
</script>
</body>
</html>
